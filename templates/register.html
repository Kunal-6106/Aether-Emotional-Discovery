{% extends "base.html" %}

{% block title %}Aether | Create Account{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card reveal">
        <p class="section-kicker">Join Aether</p>
        <h1>Create your universe</h1>
        <p class="auth-subtext">Start building your emotional taste profile today.</p>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary full-btn">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account? 
            <a href="{{ url_for('login') }}">Sign In</a>
        </p>
    </div>
</section>
{% endblock %}
